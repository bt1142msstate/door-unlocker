name: Hardware Build Question
description: Ask about the desk-test wiring, parts, mounting, or servo setup.
title: "[Hardware]: "
labels:
  - hardware
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What are you trying to build or verify?
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Current Setup
      description: List your board, servo, battery, converter, connectors, and any wiring changes.
    validations:
      required: true
  - type: textarea
    id: photos
    attributes:
      label: Photos Or Diagram
      description: Add photos or a diagram if the issue depends on wiring or placement.
