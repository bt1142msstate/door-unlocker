name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  architecture-and-contracts:
    name: Architecture and contracts
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Quality-tool negative controls
        run: python3 -m unittest discover -s script/tests -p 'test_*.py'
      - name: Maintainability gate
        continue-on-error: true
        run: python3 script/score_maintainability.py --threshold 90
      - name: Modularity gate
        run: python3 script/score_modularity.py --threshold 95
      - name: Shared parity gate
        run: python3 script/score_shared_parity.py --threshold 95
      - name: Fast command contract
        run: python3 script/check_fast_command_contract.py
      - name: Persistence contract
        run: python3 script/check_firmware_persistence_contract.py
      - name: State delivery contract
        run: python3 script/check_state_notification_delivery_contract.py
      - name: Per-release bootloader recovery invariant
        run: python3 script/check_ota_bootloader_contract.py --require-release-invariant
      - name: Mac window scene contract
        run: python3 script/check_mac_window_scene_contract.py
      - name: Physical iPhone cold and warm launch proof
        continue-on-error: true
        run: python3 script/check_ios_launch_performance_proof.py

  swift-tests:
    name: Independent Swift tests
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - name: Shared package
        run: swift test --package-path shared/DoorUnlockerShared
      - name: Mac core and admin package
        run: swift test --package-path mac/DoorUnlockerAdmin

  app-builds:
    name: App builds
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: iOS generic build
        run: >-
          xcodebuild
          -project ios/DoorUnlockerApp/DoorUnlocker.xcodeproj
          -scheme DoorUnlocker
          -configuration Debug
          -destination generic/platform=iOS
          CODE_SIGNING_ALLOWED=NO
          -quiet
          build
      - name: Mac package build
        run: swift build --package-path mac/DoorUnlockerAdmin

  tagged-firmware-recovery-proof:
    name: Tagged firmware recovery proof
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Per-release recovery invariant
        run: python3 script/check_ota_bootloader_contract.py --require-installed-recovery
      - name: Exact application OTA proof
        run: python3 script/check_firmware_release_proof.py

  production-firmware-proof:
    name: Production firmware recovery proof
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Exact installed bootloader and recovery campaign
        run: python3 script/check_ota_bootloader_contract.py --require-production
      - name: Consecutive OTA and USB recovery proof
        run: python3 script/check_ota_promotion_proof.py
      - name: Exact application OTA proof
        run: python3 script/check_firmware_release_proof.py
