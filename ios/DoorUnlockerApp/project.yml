name: DoorUnlocker
options:
  bundleIdPrefix: io.github.bt1142msstate
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    SDKROOT: iphoneos
    CURRENT_PROJECT_VERSION: "3"
    MARKETING_VERSION: "0.2.1"
packages:
  DoorUnlockerShared:
    path: ../../shared/DoorUnlockerShared
targets:
  DoorUnlocker:
    type: application
    platform: iOS
    sources:
      - path: DoorUnlocker
      - path: Shared
    info:
      path: DoorUnlocker/Info.plist
      properties:
        CFBundleDisplayName: Door Unlocker
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        DoorControllerFirmwareVersion: "0.1.26"
        UILaunchScreen:
          UIColorName: LaunchBackground
        CFBundleURLTypes:
          - CFBundleURLName: io.github.bt1142msstate.DoorUnlocker
            CFBundleURLSchemes:
              - doorunlocker
        NSBluetoothAlwaysUsageDescription: Door Unlocker uses Bluetooth to connect to your XIAO desk-test controller.
        NSFaceIDUsageDescription: Door Unlocker can require Face ID or your device passcode before sending unlock commands.
        NSLocationAlwaysAndWhenInUseUsageDescription: Door Unlocker uses your lock zone to avoid proximity unlock while you are still near your door.
        NSLocationWhenInUseUsageDescription: Door Unlocker uses your location to set and check the lock zone for proximity unlock.
        NSLocationTemporaryUsageDescriptionDictionary:
          LockZonePrecision: Door Unlocker uses precise location to decide whether your phone is inside the saved lock zone before proximity unlock can arm.
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - bluetooth-central
          - location
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.bt1142msstate.DoorUnlocker
        INFOPLIST_FILE: DoorUnlocker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DoorUnlocker/DoorUnlocker.entitlements
    dependencies:
      - package: DoorUnlockerShared
        product: DoorUnlockerShared
      - package: DoorUnlockerShared
        product: DoorUnlockerDFU
      - target: DoorUnlockerWidget
        embed: true
        codeSign: true
  DoorUnlockerWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DoorUnlockerWidget
      - path: Shared
      - path: DoorUnlocker/DoorCommandStore.swift
    info:
      path: DoorUnlockerWidget/Info.plist
      properties:
        CFBundleDisplayName: Door Unlocker
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.bt1142msstate.DoorUnlocker.widget
        INFOPLIST_FILE: DoorUnlockerWidget/Info.plist
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: DoorUnlockerWidget/DoorUnlockerWidget.entitlements
    dependencies:
      - package: DoorUnlockerShared
        product: DoorUnlockerShared
  DoorUnlockerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DoorUnlockerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.bt1142msstate.DoorUnlockerTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DoorUnlocker.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DoorUnlocker"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: DoorUnlocker
      - package: DoorUnlockerShared
        product: DoorUnlockerShared
schemes:
  DoorUnlocker:
    build:
      targets:
        DoorUnlocker: all
        DoorUnlockerWidget: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: DoorUnlockerTests
          parallelizable: true
    archive:
      config: Release
